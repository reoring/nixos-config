# Omarchy/OmniWM-inspired AeroSpace config.
#
# Mapping policy:
# - Omarchy Super -> macOS Command (cmd)
# - Workspace targets are qwertasdfgzxcvb: workspaces 1..15.
# - Omarchy AltGr -> macOS Option (alt). AeroSpace cannot distinguish right Option.
# - OmniWM Hyper-like workspace shortcuts are kept as cmd-alt-ctrl-shift aliases.

config-version = 2
start-at-login = true

after-login-command = []
after-startup-command = ['exec-and-forget /Users/reoring/.local/bin/aerospace-restore-windows']

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
key-mapping.preset = 'qwerty'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 6
outer.bottom = 6
outer.top = [{ monitor."Built-in Retina Display" = 6 }, 40]
outer.right = 6

[mode.main.binding]
# App launchers, from hey-omarchy Super bindings.
cmd-enter = '''exec-and-forget osascript -e '
tell application "Ghostty"
    new window
end tell'
'''
cmd-shift-f = 'exec-and-forget open -a Finder'
cmd-shift-b = 'exec-and-forget open -a "Google Chrome"'
cmd-alt-shift-b = 'exec-and-forget open -na "Google Chrome" --args --incognito'
cmd-shift-m = 'exec-and-forget open -a Spotify'
cmd-shift-n = 'exec-and-forget open -a Zed'
cmd-shift-d = 'exec-and-forget open -a Docker'
cmd-shift-g = 'exec-and-forget open -a Signal'
cmd-shift-o = 'exec-and-forget open -a Obsidian'
cmd-shift-w = 'exec-and-forget open -a Typora'
cmd-shift-1 = 'exec-and-forget open -a 1Password'

# Web apps, from hey-omarchy.
cmd-shift-a = 'exec-and-forget open https://chatgpt.com'
cmd-alt-shift-a = 'exec-and-forget open https://grok.com'
cmd-shift-c = 'exec-and-forget open https://app.hey.com/calendar/weeks/'
cmd-shift-e = 'exec-and-forget open https://app.hey.com'
cmd-shift-y = 'exec-and-forget open https://youtube.com/'
cmd-alt-shift-g = 'exec-and-forget open https://web.whatsapp.com/'
cmd-ctrl-shift-g = 'exec-and-forget open https://messages.google.com/web/conversations'
cmd-shift-p = 'exec-and-forget open https://photos.google.com/'
cmd-shift-x = 'exec-and-forget open https://x.com/'
cmd-alt-shift-x = 'exec-and-forget open https://x.com/compose/post'

# Workspace switching, hey-omarchy AltGr layout limited to qwertasdfgzxcvb.
alt-q = ['workspace 1', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-w = ['workspace 2', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-e = ['workspace 3', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-r = ['workspace 4', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-t = ['workspace 5', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-a = ['workspace 6', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-s = ['workspace 7', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-d = ['workspace 8', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-f = ['workspace 9', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-g = ['workspace 10', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-z = ['workspace 11', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-x = ['workspace 12', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-c = ['workspace 13', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-v = ['workspace 14', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-b = ['workspace 15', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']

# Move focused window to workspace, following hey-omarchy Shift convention.
alt-shift-q = ['move-node-to-workspace --focus-follows-window 1', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-w = ['move-node-to-workspace --focus-follows-window 2', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-e = ['move-node-to-workspace --focus-follows-window 3', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-r = ['move-node-to-workspace --focus-follows-window 4', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-t = ['move-node-to-workspace --focus-follows-window 5', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-a = ['move-node-to-workspace --focus-follows-window 6', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-s = ['move-node-to-workspace --focus-follows-window 7', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-d = ['move-node-to-workspace --focus-follows-window 8', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-f = ['move-node-to-workspace --focus-follows-window 9', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-g = ['move-node-to-workspace --focus-follows-window 10', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-z = ['move-node-to-workspace --focus-follows-window 11', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-x = ['move-node-to-workspace --focus-follows-window 12', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-c = ['move-node-to-workspace --focus-follows-window 13', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-v = ['move-node-to-workspace --focus-follows-window 14', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
alt-shift-b = ['move-node-to-workspace --focus-follows-window 15', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']

# OmniWM Hyper+Shift+1..9 aliases for moving windows.
alt-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
alt-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
alt-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
alt-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
alt-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
alt-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
alt-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
alt-shift-8 = 'move-node-to-workspace --focus-follows-window 8'
alt-shift-9 = 'move-node-to-workspace --focus-follows-window 9'

# right-hyper workspace aliases. Karabiner emits cmd+alt+ctrl+shift.
cmd-alt-ctrl-shift-q = ['workspace 1', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-w = ['workspace 2', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-e = ['workspace 3', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-r = ['workspace 4', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-t = ['workspace 5', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-a = ['workspace 6', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-s = ['workspace 7', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-d = ['workspace 8', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-f = ['workspace 9', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-g = ['workspace 10', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-z = ['workspace 11', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-x = ['workspace 12', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-c = ['workspace 13', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-v = ['workspace 14', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-b = ['workspace 15', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change']
cmd-alt-ctrl-shift-u = 'layout floating tiling'

# Focus and window movement.
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
ctrl-alt-h = 'focus left'
alt-down = 'focus down'
alt-up = 'focus up'
ctrl-alt-l = 'focus right'
alt-tab = 'focus-back-and-forth'
ctrl-alt-tab = 'workspace-back-and-forth'

alt-shift-left = 'move left'
alt-shift-down = 'move down'
alt-shift-up = 'move up'
alt-shift-right = 'move right'
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'
ctrl-alt-shift-left = 'move-node-to-monitor --focus-follows-window --wrap-around prev'
ctrl-alt-shift-right = 'move-node-to-monitor --focus-follows-window --wrap-around next'
ctrl-cmd-tab = 'focus-monitor --wrap-around next'
ctrl-cmd-backtick = 'focus-monitor --wrap-around prev'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Layout, split, fullscreen, and sizing.
cmd-u = 'join-with right'
alt-slash = 'layout tiles'
alt-shift-slash = 'layout tiles'
alt-comma = 'layout accordion'
alt-shift-comma = 'layout accordion'
alt-shift-backslash = 'layout tiles accordion'

alt-enter = 'fullscreen'
ctrl-alt-f = 'fullscreen --no-outer-gaps'
alt-cmd-f = 'macos-native-fullscreen'

alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'
alt-period = 'resize smart +50'
alt-shift-minus = 'resize height -50'
alt-shift-equal = 'resize height +50'
ctrl-alt-r = 'balance-sizes'
ctrl-alt-b = 'balance-sizes'

# Menus and quick access.
ctrl-alt-space = 'mode service'
ctrl-alt-m = 'mode service'
alt-backtick = 'exec-and-forget open -a Ghostty'

# Service mode.
cmd-alt-ctrl-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
b = ['balance-sizes', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
cmd-alt-ctrl-shift-semicolon = 'mode main'

[workspace-to-monitor-force-assignment]
# Park workspaces: use the external display when present; fall back to main on laptop-only.
1 = ['DELL U4021QW', 'main']
2 = ['DELL U4021QW', 'main']
3 = ['DELL U4021QW', 'main']
4 = ['DELL U4021QW', 'main']
5 = ['DELL U4021QW', 'main']
6 = ['DELL U4021QW', 'main']
7 = ['DELL U4021QW', 'main']
8 = ['DELL U4021QW', 'main']
9 = ['DELL U4021QW', 'main']
10 = ['DELL U4021QW', 'main']

# Built-in workspaces: keep a real assigned workspace on the laptop display when docked.
11 = ['built-in', 'main']
12 = ['built-in', 'main']
13 = ['built-in', 'main']
14 = ['built-in', 'main']
15 = ['built-in', 'main']

[[on-window-detected]]
if.app-id = 'app.zeimuhub.agent'
run = ['layout floating']

[[on-window-detected]]
if.app-name-regex-substring = 'zeimuhub-agent'
run = ['layout floating']

[[on-window-detected]]
if.app-name-regex-substring = 'ZeimuHub Agent'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'org.alacritty'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.ScreenSharing'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = ['layout floating']
